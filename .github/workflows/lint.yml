---
name: lint

on: [push, pull_request, workflow_dispatch]

env:
  PYTHON_VERSION: '3.11'

jobs:
  ansible-lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install ansible collections
        run: uv run --extra vm ansible-galaxy collection install ansible.posix community.general
      - name: Run ansible-lint
        run: uv run --extra lint ansible-lint --sarif-file ansible-lint.sarif vm/site.yml
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: ansible-lint.sarif
          category: ansible-lint

  ruff-format:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Run ruff format
        run: uv run --extra lint ruff format --check --output-format github

  ruff-lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Run ruff check
        run: uv run --extra lint ruff check --output-format sarif --output-file ruff.sarif
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: ruff.sarif
          category: ruff
