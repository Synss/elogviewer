---
name: python-test

on:  # yamllint disable-line rule:truthy
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  ty:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    strategy:
      matrix:
        python-version: ['3.12', '3.13', '3.14']
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-python
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run ty
        run: >-
          uv run --extra lint
          ty check --output-format junit > ty.xml
      - name: Publish ty results
        uses: mikepenz/action-junit-report@v6
        if: ${{ !cancelled() }}
        with:
          report_paths: ty.xml

  pytest:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    strategy:
      matrix:
        python-version: ['3.12', '3.13', '3.14']
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-python
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install qt deps
        run: sudo apt update && sudo apt install -y libegl1
      - name: Run pytest
        env:
          PYTHONPATH: .
          QT_QPA_PLATFORM: offscreen
        run: uv run --extra test pytest --junit-xml=pytest.xml
      - name: Publish pytest results
        uses: mikepenz/action-junit-report@v6
        if: ${{ !cancelled() }}
        with:
          report_paths: pytest.xml

  all-checks:
    if: ${{ !cancelled() }}
    needs: [ty, pytest]
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - if: >-
          ${{ contains(needs.*.result, 'failure')
          || contains(needs.*.result, 'cancelled') }}
        run: exit 1
