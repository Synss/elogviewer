---
name: check-artefacts

on:  # yamllint disable-line rule:truthy
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.13'

jobs:
  check-artefacts:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    strategy:
      matrix:
        artefact: ['list-whl', 'list-tar']
      fail-fast: false
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-python
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: extractions/setup-just@v4
      - uses: shogo82148/actions-setup-perl@v1
        with:
          install-modules-with: cpm
          install-modules-args: --cpanfile ./scripts/check-artefacts.cpan
      - name: Run check-artefacts for ${{ matrix.artefact }}
        run: >-
          just ${{ matrix.artefact }}
          | ./scripts/check-artefacts --format github
          --config ./scripts/check-artefacts.yml -

  all-checks:
    if: ${{ !cancelled() }}
    needs: [check-artefacts]
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - if: >-
          ${{ contains(needs.*.result, 'failure')
          || contains(needs.*.result, 'cancelled') }}
        run: exit 1
