---
name: publish

on:
  push:
    tags:
      - 'v*'

env:
  PYTHON_VERSION: '3.13'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Build
        run: uv build
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
