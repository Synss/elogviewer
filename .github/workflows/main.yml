---
name: main
on: [push, pull_request, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Install qt deps
        run: sudo apt update && sudo apt install -y libegl1
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: '3.11'
      - name: Install ansible collections
        run: uv run --extra vm ansible-galaxy collection install ansible.posix community.general
      - name: Test ansible roles
        run: cd vm/roles/gentoo_base && uv run --extra vm molecule test
      - name: Publish ansible test results
        uses: mikepenz/action-junit-report@v6
        if: always()
        with:
          report_paths: vm/roles/gentoo_base/junit/*.xml
      - name: Check format
        run: uv run --extra lint ruff format --check
      - name: Lint python
        run: uv run --extra lint ruff check
      - name: Generate ruff SARIF
        run: uv run --extra lint ruff check --output-format sarif > ruff.sarif
        if: always()
        continue-on-error: true
      - name: Upload ruff SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: ruff.sarif
          category: ruff
      - name: Lint ansible
        run: uv run --extra lint ansible-lint vm/site.yml
      - name: Generate ansible-lint SARIF
        run: uv run --extra lint ansible-lint --format sarif vm/site.yml > ansible-lint.sarif
        if: always()
        continue-on-error: true
      - name: Upload ansible-lint SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: ansible-lint.sarif
          category: ansible-lint
      - name: Test
        run: PYTHONPATH=. QT_QPA_PLATFORM=offscreen uv run --extra test pytest --junit-xml=junit/pytest.xml
      - name: Publish pytest results
        uses: mikepenz/action-junit-report@v6
        if: always()
        with:
          report_paths: junit/pytest.xml
      - name: Build
        run: uv build
      - name: Upload source dist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist
          if-no-files-found: error
