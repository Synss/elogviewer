---
name: main

on: [push, pull_request, workflow_dispatch]

env:
  PYTHON_VERSION: '3.11'

jobs:
  ansible:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install ansible collections
        run: uv run --extra vm ansible-galaxy collection install ansible.posix community.general
      - name: Lint ansible
        run: uv run --extra lint ansible-lint --format sarif vm/site.yml > ansible-lint.sarif
        if: always()
        continue-on-error: true
      - name: Upload ansible-lint SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: ansible-lint.sarif
          category: ansible-lint
      - name: Test ansible roles
        run: cd vm/roles/gentoo_base && uv run --extra vm molecule test
      - name: Publish ansible test results
        uses: mikepenz/action-junit-report@v6
        if: always()
        with:
          report_paths: vm/roles/gentoo_base/junit/*.xml

  python:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Install qt deps
        run: sudo apt update && sudo apt install -y libegl1
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Check format
        run: uv run --extra lint ruff format --check
      - name: Lint python
        run: mkdir -p sarif && uv run --extra lint ruff check --output-format sarif --output-file sarif/ruff.sarif
        if: always()
        continue-on-error: true
      - name: Type check
        run: mkdir -p sarif && uv run --extra lint ty check --output-format sarif --output-file sarif/ty.sarif elogviewer.py tests/
        if: always()
        continue-on-error: true
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: sarif/
      - name: Test
        run: PYTHONPATH=. QT_QPA_PLATFORM=offscreen uv run --extra test pytest --junit-xml=junit/pytest.xml
      - name: Publish pytest results
        uses: mikepenz/action-junit-report@v6
        if: always()
        with:
          report_paths: junit/pytest.xml
