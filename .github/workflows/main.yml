---
name: main
on: [push, pull_request, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Install qt deps
        run: sudo apt update && sudo apt install -y libegl1
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: '3.11'
      - name: Test ansible roles
        run: cd vm/roles/gentoo_base && uv run --extra vm molecule test
      - name: Check format
        run: uv run ruff format --check
      - name: Lint
        run: uv run ruff check
      - name: Test
        run: PYTHONPATH=. QT_QPA_PLATFORM=offscreen uv run --extra test pytest
      - name: Build
        run: uv build
      - name: Upload source dist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist
          if-no-files-found: error
