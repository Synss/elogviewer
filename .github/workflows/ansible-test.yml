---
name: ansible-test

on:  # yamllint disable-line rule:truthy
  push:
    branches: [main]
    paths:
      - 'roles/**'
      - 'molecule/**'
      - 'uv.lock'
  pull_request:
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.13'

jobs:
  ansible-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-ansible
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Test gentoo_base
        id: test_base
        run: cd roles/gentoo_base && uv run --extra vm molecule test
        continue-on-error: true
      - name: Test gentoo_system
        id: test_system
        run: cd roles/gentoo_system && uv run --extra vm molecule test
        continue-on-error: true
      - name: Publish test results
        uses: mikepenz/action-junit-report@v6
        if: ${{ !cancelled() }}
        with:
          report_paths: roles/*/junit/*.xml
      - name: Fail if any role failed
        if: >-
          steps.test_base.outcome == 'failure'
          || steps.test_system.outcome == 'failure'
        run: exit 1

  all-checks:
    if: ${{ !cancelled() }}
    needs: [ansible-test]
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - if: >-
          ${{ contains(needs.*.result, 'failure')
          || contains(needs.*.result, 'cancelled') }}
        run: exit 1
