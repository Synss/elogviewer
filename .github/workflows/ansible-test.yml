---
name: ansible-test

on:
  push:
    paths:
      - 'vm/**'
      - 'uv.lock'
  pull_request:
    paths:
      - 'vm/**'
      - 'uv.lock'
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.13'

jobs:
  ansible-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-ansible
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Test ansible roles
        run: cd vm/roles/gentoo_base && uv run --extra vm molecule test
      - name: Publish test results
        uses: mikepenz/action-junit-report@v6
        if: always()
        with:
          report_paths: vm/roles/gentoo_base/junit/*.xml
