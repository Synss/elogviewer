---
extends: default

ignore: |
  .venv

rules:
  line-length:
    max: 160
  # ansible-lint compat
  comments:
    min-spaces-from-content: 1
  comments-indentation: false
  braces:
    max-spaces-inside: 1
  octal-values:
    forbid-implicit-octal: true
    forbid-explicit-octal: true
  # end of ansible-lint compat
