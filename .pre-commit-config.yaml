---
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--unsafe]  # allow custom YAML tags used by Ansible

  - repo: local
    hooks:
      - id: just-fmt
        name: just --fmt
        entry: uv run --group dev just --fmt --unstable
        language: unsupported
        files: ^justfile$
        pass_filenames: false

      - id: ruff-format
        name: ruff format
        entry: uv run --group dev ruff format --check
        language: unsupported
        types: [python]

      - id: ruff
        name: ruff check
        entry: uv run --group dev ruff check
        language: unsupported
        types: [python]

      - id: ruff-isort
        name: ruff check-isort
        entry: uv run --group dev ruff check --select I
        language: unsupported
        types: [python]

      - id: basedpyright
        name: basedpyright
        entry: uv run --group dev basedpyright
        language: unsupported
        types: [python]
        pass_filenames: false

      - id: yamllint
        name: yamllint
        entry: uv run --group vm yamllint
        language: unsupported
        types: [yaml]

      - id: ansible-lint
        name: ansible-lint
        entry: uv run --group vm ansible-lint .
        language: unsupported
        files: ^(roles|molecule|inventory)/
        pass_filenames: false

      - id: zizmor
        name: zizmor
        entry: uv run --group dev zizmor .github
        language: unsupported
        types: [yaml]
        files: ^.github/
