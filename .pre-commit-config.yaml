---
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--unsafe]  # allow custom YAML tags used by Ansible

  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format
        entry: uv run --extra lint ruff format --check
        language: unsupported
        types: [python]

      - id: ruff
        name: ruff lint
        entry: uv run --extra lint ruff check
        language: unsupported
        types: [python]

      - id: yamllint
        name: yamllint
        entry: uv run --extra lint yamllint
        language: unsupported
        types: [yaml]

      - id: ansible-lint
        name: ansible-lint
        entry: uv run --extra lint ansible-lint .
        language: unsupported
        files: ^(roles|molecule|inventory)/
        pass_filenames: false

      - id: zizmor
        name: zizmor
        entry: zizmor .github
        language: unsupported
        types: [yaml]
        files: ^.github/
