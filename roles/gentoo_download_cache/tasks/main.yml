---
- name: Depclean
  community.general.portage:
    depclean: true
  changed_when: false

- name: Create cache dirs # noqa: risky-file-permissions
  ansible.builtin.file:
    path: "/var/cache/{{ item }}"
    state: directory
  loop: ["binpkgs", "distfiles"]
  changed_when: false

- name: Trim cache
  ansible.builtin.command: "/usr/bin/eclean {{ item }}"
  loop: ["distfiles", "packages"]
  changed_when: false

- name: Download cache
  ansible.builtin.include_role:
    name: gentoo_pkgcache
    tasks_from: sync.yml
  vars:
    gentoo_pkgcache_direction: pull
    gentoo_pkgcache_delete: true
    gentoo_pkgcache_pairs:
      - { src: /var/cache/binpkgs, dest: "{{ gentoo_cache_binpkgs }}" }
      - { src: /var/cache/distfiles, dest: "{{ gentoo_cache_distfiles }}" }
