---
- name: Create local cache directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ gentoo_cache_binpkgs }}"
    - "{{ gentoo_cache_distfiles }}"
  delegate_to: localhost
  become: false
  changed_when: false

- name: Upload cache
  ansible.builtin.include_role:
    name: gentoo_pkgcache
    tasks_from: sync.yml
  vars:
    gentoo_pkgcache_direction: push
    gentoo_pkgcache_use_ssh_args: true
    gentoo_pkgcache_pairs:
      - { src: "{{ gentoo_cache_binpkgs }}", dest: /var/cache/binpkgs }
      - { src: "{{ gentoo_cache_distfiles }}", dest: /var/cache/distfiles }
