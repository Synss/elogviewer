---
- name: Install VirtualBox guest packages
  community.general.portage:
    name:
      - acct-group/vboxguest
      - acct-group/vboxsf
      - acct-group/vboxusers
      - acct-user/vboxguest
      - app-emulation/virtualbox-guest-additions
      - app-emulation/virtualbox-guest-modules
    state: present

- name: Enable VirtualBox guest additions service
  ansible.builtin.service:
    name: virtualbox-guest-additions
    enabled: true
    state: started

- name: Add user to VirtualBox groups
  ansible.builtin.user:
    name: "{{ gentoo_user_name }}"
    groups:
      - vboxguest
      - vboxsf
      - vboxusers
    append: true
