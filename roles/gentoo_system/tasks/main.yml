---
- name: Check last sync time
  ansible.builtin.stat:
    path: /var/db/repos/gentoo/metadata/timestamp.chk
  register: gentoo_system_sync_timestamp
  tags: sync

- name: "Sync tree"
  ansible.builtin.command: /usr/bin/emerge --sync
  tags: sync
  when:
    - gentoo_run_sync | default(false)
    - >-
      not gentoo_system_sync_timestamp.stat.exists or
      gentoo_system_sync_timestamp.stat.mtime is
      older_than(ansible_facts["date_time"]["epoch"], 86400)
  changed_when: false
  retries: 3 # rsync may be flaky in the CI.
  delay: 30

- name: "Install `equery` (for portage module)"
  ansible.builtin.command: /usr/bin/emerge app-portage/gentoolkit
  args:
    creates: /usr/bin/equery
  environment: "{{ {'PYTHON_TARGETS': python_single_target} if python_single_target is defined else {} }}"

- name: "Ensure /etc/portage/package.mask directory exists"
  ansible.builtin.file:
    path: /etc/portage/package.mask
    state: directory
    mode: "0755"

- name: "Mask ebuilds broken by portage 3.x strict USE checking"
  ansible.builtin.copy:
    dest: /etc/portage/package.mask/broken-ebuilds
    content: "{{ gentoo_system_masked_packages | join('\n') }}\n"
    mode: "0644"
  when: gentoo_system_masked_packages | default([]) | length > 0

- name: "Ensure /etc/portage/profile directory exists"
  ansible.builtin.file:
    path: /etc/portage/profile
    state: directory
    mode: "0755"

- name: "Drop moved packages from @system profile"
  ansible.builtin.copy:
    dest: /etc/portage/profile/packages
    content: "{{ gentoo_system_profile_packages | join('\n') }}\n"
    mode: "0644"
  when: gentoo_system_profile_packages | default([]) | length > 0

- name: "Update system"
  ansible.builtin.import_tasks: "update_system.yml"

- name: "Flush handlers"
  ansible.builtin.meta: flush_handlers

- name: "Update world"
  ansible.builtin.import_tasks: "update_world.yml"

- name: "Install required packages"
  ansible.builtin.import_tasks: "install.yml"
