---
- name: Update @system
  block:
    - name: Detect system Python version
      ansible.builtin.command:
        cmd: >-
          {{ ansible_python_interpreter | default('/usr/bin/python3') }}
          -c "import sys; print('python{}_{}'.format(*sys.version_info[:2]))"
      register: _gentoo_system_python_detected
      changed_when: false
      when: gentoo_manage_python_targets | default(true)

    - name: Configure make.conf/10_python_targets
      ansible.builtin.template:
        src: make_conf_python_targets.j2
        dest: /etc/portage/make.conf/10_python_targets
        mode: "0644"
      vars:
        _detected: "{{ _gentoo_system_python_detected.stdout | default('') }}"
        _python_targets: "{{ python_targets | default(_detected) }}"
        # yamllint disable rule:line-length
        _python_single_target: "{{ python_single_target | default(python_targets | default(_detected)) }}"
        # yamllint enable rule:line-length
      changed_when: false
      when: gentoo_manage_python_targets | default(true)

    - name: Remove make.conf/10_python_targets
      ansible.builtin.file:
        path: /etc/portage/make.conf/10_python_targets
        state: absent
      when: not gentoo_manage_python_targets | default(true)

    - name: Rebuild python-exec with updated PYTHON_TARGETS
      community.general.portage:
        package: dev-lang/python-exec
        oneshot: true
        newuse: true
      changed_when: false

    - name: Update system
      ansible.builtin.command: >-
        /usr/bin/emerge --update --deep --changed-use --noreplace --ask=n
        --ignore-built-slot-operator-deps=y
        @system
      register: gentoo_system_update_system
      changed_when: false
      failed_when: gentoo_system_update_system.rc != 0

    - name: Rebuild packages broken by slot changes
      community.general.portage:
        package: "@preserved-rebuild"
        state: present
      changed_when: false
      failed_when: false

    - name: Rebuild system with Python targets
      community.general.portage:
        package: "@system"
        update: true
        deep: true
        changed_use: true
      register: gentoo_system_rebuild_system
      changed_when: false

    - name: Report cache hits [system]
      ansible.builtin.include_tasks: report_cache_hits.yml
      vars:
        _output: "{{ gentoo_system_update_system.stdout }}{{ gentoo_system_update_system.stderr }}"

    - name: Report cache hits [system rebuild]
      ansible.builtin.include_tasks: report_cache_hits.yml
      vars:
        _output: "{{ gentoo_system_rebuild_system.stdout }}{{ gentoo_system_rebuild_system.stderr }}"

    - name: Update cache [system]
      ansible.builtin.include_role:
        name: gentoo_pkgcache
        tasks_from: sync.yml
      vars:
        gentoo_pkgcache_direction: pull
        gentoo_pkgcache_pairs:
          - src: /var/cache/binpkgs
            dest: "{{ gentoo_cache_binpkgs }}"
          - src: /var/cache/distfiles
            dest: "{{ gentoo_cache_distfiles }}"

- name: "Request reboot after updates" # noqa: no-handler
  ansible.builtin.debug:
    msg: "Kernel update detected, requesting reboot"
  when:
    - gentoo_allow_reboot | default(true)
    - gentoo_system_update_system.stdout is search('sys-kernel/')
  notify: Reboot system
