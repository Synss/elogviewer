---
- name: Clean up packages
  community.general.portage:
    package: net-wireless/wireless-tools
    state: absent
    depclean: true

- name: Update @world
  block:
    - name: Update world
      community.general.portage:
        package: "@world"
        update: true
        deep: true
        changed_use: true
        withbdeps: true
      register: gentoo_system_update_world
      changed_when: false
      failed_when: gentoo_system_update_world.rc != 0

    - name: Rebuild packages broken by slot changes
      community.general.portage:
        package: "@preserved-rebuild"
        state: present
      changed_when: false
      failed_when: false

    - name: Report cache hits [world]
      ansible.builtin.include_tasks: report_cache_hits.yml
      vars:
        _output: "{{ gentoo_system_update_world.stdout }}{{ gentoo_system_update_world.stderr }}"

    - name: Update cache [world]
      ansible.builtin.include_role:
        name: gentoo_pkgcache
        tasks_from: sync.yml
      vars:
        gentoo_pkgcache_direction: pull
        gentoo_pkgcache_pairs:
          - src: /var/cache/binpkgs
            dest: "{{ gentoo_cache_binpkgs }}"
          - src: /var/cache/distfiles
            dest: "{{ gentoo_cache_distfiles }}"

  rescue:
    - name: Warn on world update failure
      ansible.builtin.debug:
        msg: "World update failed — manual intervention may be needed"

- name: "Request reboot after kernel update" # noqa: no-handler
  ansible.builtin.debug:
    msg: "Kernel update detected, requesting reboot"
  when:
    - gentoo_system_update_world is defined
    - gentoo_system_update_world.stdout is search('sys-kernel/')
  notify: Reboot system
