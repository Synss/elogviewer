---
- name: Read qt6 output
  ansible.builtin.slurp:
    src: /tmp/molecule_make_conf_qt6
  register: gentoo_base_conf_qt6

- name: Read qt5 output
  ansible.builtin.slurp:
    src: /tmp/molecule_make_conf_qt5
  register: gentoo_base_conf_qt5

- name: Read default python output
  ansible.builtin.slurp:
    src: /tmp/molecule_make_conf_python_defaults
  register: gentoo_base_conf_python_defaults

- name: Set content facts
  ansible.builtin.set_fact:
    gentoo_base_content_qt6: "{{ gentoo_base_conf_qt6.content | b64decode }}"
    gentoo_base_content_qt5: "{{ gentoo_base_conf_qt5.content | b64decode }}"
    gentoo_base_content_python_defaults: "{{ gentoo_base_conf_python_defaults.content | b64decode }}"

- name: Assert vcpus substitution in MAKEOPTS
  ansible.builtin.assert:
    that: gentoo_base_content_qt6 is search('MAKEOPTS="-j4"')
    fail_msg: "MAKEOPTS should contain -j4 (ansible_processor_vcpus=4)"

- name: Assert vcpus substitution in EMERGE_DEFAULT_OPTS
  ansible.builtin.assert:
    that:
      - gentoo_base_content_qt6 is search('--jobs=4')
      - gentoo_base_content_qt6 is search('--load-average=4')
    fail_msg: "EMERGE_DEFAULT_OPTS should use ansible_processor_vcpus=4"

- name: Assert qt_use_flag appears in USE
  ansible.builtin.assert:
    that:
      - gentoo_base_content_qt6 is search('USE=.*qt6')
      - gentoo_base_content_qt5 is search('USE=.*qt5')
      - gentoo_base_content_qt5 is not search('USE=.*qt6')
    fail_msg: "USE line should contain the correct qt flag"

- name: Assert USE_PYTHON and PYTHON_TARGETS are set when defined
  ansible.builtin.assert:
    that:
      - gentoo_base_content_qt5 is search('USE_PYTHON=.*3\.12')
      - gentoo_base_content_qt6 is search('USE_PYTHON=.*3\.12')
      - gentoo_base_content_qt5 is search('PYTHON_TARGETS=.*python3_12')
      - gentoo_base_content_qt6 is search('PYTHON_TARGETS=.*python3_12')
    fail_msg: "USE_PYTHON or PYTHON_TARGET variables missing"

- name: Assert USE_PYTHON and PYTHON_TARGETS are absent when undefined
  ansible.builtin.assert:
    that:
      - gentoo_base_content_python_defaults is not search('USE_PYTHON=')
      - gentoo_base_content_python_defaults is not search('PYTHON_TARGETS=')
    fail_msg: "USE_PYTHON or PYTHON_TARGET should be left out by default"
