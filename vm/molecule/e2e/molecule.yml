---
driver:
  name: docker
platforms:
  - name: gentoo-e2e
    image: gentoo/stage3:latest
    pre_build_image: true
    command: sleep infinity
    volumes:
      - "${MOLECULE_PROJECT_DIRECTORY}/.cache/docker/binpkgs:/var/cache/binpkgs"
      - "${MOLECULE_PROJECT_DIRECTORY}/.cache/distfiles:/var/cache/distfiles"
      - "${MOLECULE_PROJECT_DIRECTORY}/.cache/repos:/var/db/repos"
provisioner:
  name: ansible
  env:
    JUNIT_OUTPUT_DIR: "${MOLECULE_PROJECT_DIRECTORY}/junit/e2e"
    ANSIBLE_ROLES_PATH: "${MOLECULE_PROJECT_DIRECTORY}/roles"
    ANSIBLE_ALLOW_BROKEN_CONDITIONALS: "true"
  config_options:
    defaults:
      callbacks_enabled: junit
      remote_tmp: /tmp/.ansible
  inventory:
    links:
      group_vars: group_vars/
    hosts:
      all:
        hosts:
          gentoo-e2e:
            ansible_connection: docker
  playbooks:
    prepare: prepare.yml
    converge: converge.yml
    verify: verify.yml
verifier:
  name: ansible
scenario:
  test_sequence:
    - syntax
    - create
    - prepare
    - converge
    - idempotence
    - verify
    - destroy
