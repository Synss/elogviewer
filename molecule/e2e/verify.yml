---
- name: E2E verify
  hosts: all
  gather_facts: false
  tasks:
    - name: Check gentoo user exists with expected groups
      ansible.builtin.command: id gentoo
      register: gentoo_id
      changed_when: false

    - name: Assert gentoo user has required groups
      ansible.builtin.assert:
        that:
          - "'adm' in gentoo_id.stdout"
          - "'wheel' in gentoo_id.stdout"

    - name: Check sudo is configured for gentoo user
      ansible.builtin.command: sudo -l -U gentoo
      changed_when: false

    - name: Check portage profile is valid
      ansible.builtin.command: emerge --info
      changed_when: false

    - name: Check elogviewer is available in portage
      ansible.builtin.command: emerge --pretend --ask=n app-portage/elogviewer
      changed_when: false
      ignore_errors: true
      register: gentoo_portage_elogviewer_check

    - name: Check uv is available
      ansible.builtin.command: uv --version
      changed_when: false

    - name: Get Gentoo Python version
      ansible.builtin.command: python3 --version
      register: _gentoo_python_version
      changed_when: false

    - name: Report Gentoo Python version
      ansible.builtin.debug:
        msg: "Gentoo Python version: {{ _gentoo_python_version.stdout }}"

    - name: Build sdist
      ansible.builtin.command:
        cmd: uv build --sdist
        chdir: "{{ playbook_dir | dirname | dirname }}"
      delegate_to: localhost
      changed_when: true

    - name: Find sdist
      ansible.builtin.find:
        paths: "{{ playbook_dir | dirname | dirname }}/dist"
        patterns: "elogviewer-*.tar.gz"
      delegate_to: localhost
      register: _sdist

    - name: Copy sdist to container
      ansible.builtin.copy:
        src: "{{ (_sdist.files | sort(attribute='mtime') | last).path }}"
        dest: /tmp/elogviewer.tar.gz
        mode: "0644"

    - name: Create extraction directory
      ansible.builtin.file:
        path: /tmp/elogviewer-src
        state: directory
        mode: "0755"

    - name: Extract sdist
      ansible.builtin.unarchive:
        src: /tmp/elogviewer.tar.gz
        dest: /tmp/elogviewer-src
        remote_src: true
        extra_opts: ["--strip-components=1"]

    - name: Create venv
      ansible.builtin.command: python3 -m venv --system-site-packages /tmp/elogviewer-venv
      changed_when: true

    - name: Install elogviewer and test dependencies into venv
      ansible.builtin.command: >-
        uv pip install --python /tmp/elogviewer-venv/bin/python
        /tmp/elogviewer-src pytest pytest-qt pyfakefs
      changed_when: true

    - name: Run pytest suite
      ansible.builtin.command: /tmp/elogviewer-venv/bin/python -m pytest /tmp/elogviewer-src/tests/
      environment:
        QT_QPA_PLATFORM: offscreen
      changed_when: false

    - name: Fail if elogviewer is not installable via the official ebuild
      ansible.builtin.fail:
        msg: >-
          app-portage/elogviewer could not be resolved by portage (see the
          "Check elogviewer is available in portage" task above) — the
          published ebuild likely needs a PYTHON_COMPAT or dependency bump to
          track Gentoo's current defaults.
      when: gentoo_portage_elogviewer_check is failed
