---
- name: Prepare
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Create junit output directory
      ansible.builtin.file:
        path: "{{ lookup('env', 'JUNIT_OUTPUT_DIR') }}"
        state: directory
        mode: "0755"

- name: Bootstrap container
  hosts: all
  gather_facts: false
  become: false
  vars:
    ansible_pipelining: true
  tasks:
    - name: Create Ansible temp directory
      ansible.builtin.file:
        path: /tmp/.ansible
        state: directory
        mode: "0700"
